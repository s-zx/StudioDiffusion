defaults:
  - base

platform: etsy
adapter_type: lora

description: >
  LoRA adapter for Etsy aesthetic.

data:
  platform_dir: "data/platform_sets/etsy"
  train_split: 0.8
  image_size: 1024
  center_crop: true

lora:
  rank: 16
  alpha: 16
  target_modules:
    - "to_q"
    - "to_k"
    - "to_v"
    - "to_out.0"
    - "add_q_proj"
    - "add_k_proj"
    - "add_v_proj"
    - "to_add_out"
  dropout: 0.0

training:
  max_train_steps: 3000
  learning_rate: 1.0e-4
  train_batch_size: 2

hyperparameter_sweep:
  learning_rate: [1.0e-5, 5.0e-5, 1.0e-4, 5.0e-4]
  max_train_steps: [1000, 2000, 3000, 5000]
  lora_rank: [4, 8, 16, 32, 64]
  train_data_fraction: [0.25, 0.5, 0.75, 1.0]
